<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="utf-8">
        <title>Vorgangstypen</title>
        <link rel="manifest" href="./manifest.json">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
        <link rel="apple-touch-icon" href="images/forensics.png">
        <link rel="shortcut icon" href="images/forensics.png">
        <link rel="stylesheet" href="styles/forensics.css">
        <script src="js/vue@3.2.26.global.prod.js"></script>
        <script type="module" src="js/vorgangstypen.mjs"></script>
    </head>
    <body>
        
        <!-- Titelzeile -->
        <titelzeile :fuer-einstellungen="true"></titelzeile>

        <!-- Toolbar -->
        <einstellungen-toolbar selected-tab="Vorgangstypen"></einstellungen-toolbar>

        <!-- Anwendungsinhalt -->
        <div class="app-content">

            <div class="app-content-grid grid-3-col">

                <!-- Liste -->
                <div v-if="vorgangstypen" class="panel vertical-navigation" style="grid-column: 1; grid-row: 1 / 3;">
                    <div class="panel-header">
                        <div class="panel-title">Vorgangstypen</div>
                        <div class="button-group">
                            <button class="button" @click="behandleNeuerVorgangstypButtonKlick">+ Neu</button>
                        </div>
                    </div>
        
                    <div class="button-list">
                        <button v-for="vorgangstyp in sortierteVorgangstypen" :class="{selected: selektierterVorgangstyp==vorgangstyp}" @click="selektierterVorgangstyp = vorgangstyp">{{ vorgangstyp.Name }}</button>
                    </div>
                </div>
        
                <template v-if="selektierterVorgangstyp">
                    <!-- Details -->
                    <div class="panel" :class="{changed: aenderungVorhanden}" style="grid-column: 2 / 4; grid-row: 1;">
                        <div class="panel-header">
                            <div class="panel-title">{{ selektierterVorgangstyp.Name }}</div>
                            <div class="button-group">
                                <button class="button save" @click="behandleSpeichernButtonKlick">Speichern</button>
                                <button class="button red" @click="behandleLoeschenButtonKlick">Löschen</button>
                            </div>
                        </div>
                    
                        <div class="panel-grid">
                    
                            <div class="forminput">
                                <label>Name</label>
                                <input v-model="selektierterVorgangstyp.Name" @input="aenderungVorhanden = true"  />
                            </div>
                        
                        </div>
        
                    </div>
        
                    <!-- Vorgangsaufgaben -->
                    <div v-if="vorgangsaufgaben" class="panel" style="grid-column: 2; grid-row: 2;">
                        <div class="panel-header">
                            <div class="panel-title">Vorgangsaufgaben</div>
                            <div class="button-group">
                                <button class="button save" @click="behandleNeueVorgangsaufgabeButtonKlick">+ Neu</button>
                            </div>
                        </div>
                    
                        <table class="panel-table">
                            <thead>
                                <tr>
                                    <th></th>
                                    <th>Vorgangsaufgabe</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="vorgangsaufgabe in sortierteVorgangsaufgaben">
                                    <td class="nobreak">{{ vorgangsaufgabe.Reihenfolge }}</td>
                                    <td class="nobreak"><a :href="'aufgabeneditor.html?' + vorgangsaufgabe.Id">{{ vorgangsaufgabe.Titel || 'Unbenannt' }}</a></td>
                                </tr>
                            </tbody>
                        </table>
        
                    </div>
        
                    <!-- Spurenaufgaben -->
                    <div v-if="spurenaufgaben" class="panel" style="grid-column: 3; grid-row: 2;">
                        <div class="panel-header">
                            <div class="panel-title">Spurenaufgaben</div>
                            <div class="button-group">
                                <button class="button save" @click="behandleNeueSpurenaufgabeButtonKlick">+ Neu</button>
                            </div>
                        </div>
                    
                        <table class="panel-table">
                            <thead>
                                <tr>
                                    <th></th>
                                    <th>Spurenaufgabe</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="spurenaufgabe in sortierteSpurenaufgaben">
                                    <td class="nobreak">{{ spurenaufgabe.Reihenfolge }}</td>
                                    <td class="nobreak"><a :href="'aufgabeneditor.html?' + spurenaufgabe.Id">{{ spurenaufgabe.Titel || 'Unbenannt' }}</a></td>
                                </tr>
                            </tbody>
                        </table>
        
                    </div>
        
                </template>
            
            </div>

        </div>
        
    </body>
  
</html>
